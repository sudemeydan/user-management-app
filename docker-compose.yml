version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: sude
      POSTGRES_PASSWORD: superpassword
      POSTGRES_DB: user_management_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # YENİ: Mesaj Kuyruğu Servisi
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq-broker
    ports:
      - "5672:5672"   # Node.js ve Python'un haberleşeceği port
      - "15672:15672" # RabbitMQ Görsel Yönetim Paneli (Browser'dan girilebilir)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://sude:superpassword@db:5432/user_management_db?schema=public
      - RABBITMQ_URL=amqp://rabbitmq:5672 # YENİ: Backend'in RabbitMQ adresi
    env_file:
      - ./server/.env
    command: sh -c "sleep 10 && npx prisma db push && node index.js"
    depends_on:
      - db
      - rabbitmq # YENİ: Backend RabbitMQ'yu beklemeli

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend-ui
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    depends_on:
      - backend

  # YENİ: Python CV Ayrıştırma Servisimiz
  cv-worker:
    build:
      context: ./cv-parser
      dockerfile: Dockerfile
    container_name: python-cv-worker
    environment:
      - RABBITMQ_HOST=rabbitmq # Python kodundaki değişken
    depends_on:
      - rabbitmq

volumes:
  pgdata:
  rabbitmq_data: # : Kuyruk verileri için kalıcı alan