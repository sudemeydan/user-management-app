version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: sude
      POSTGRES_PASSWORD: superpassword
      POSTGRES_DB: user_management_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: backend-api
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://sude:superpassword@db:5432/user_management_db?schema=public
    env_file:
      - ./server/.env
    command: sh -c "sleep 10 && npx prisma db push && node index.js"
    depends_on:
      - db

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: frontend-ui
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    depends_on:
      - backend

volumes:
  pgdata: